<!DOCTYPE html>
<html>
<head>
    <title>Log</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <style>
        body {
            background: black;
            color: #00FF00;
            font-family: monospace;
            margin: 0;
        }

        a { color: #00FF00; }

        /* Верхняя панель */
        #topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: black;
            padding: 10px;
            border-bottom: 1px solid #00FF00;
            z-index: 1000;
        }

        /* Лог */
        #log {
            margin-top: 60px;
            padding: 10px;
        }
    </style>
</head>
<body>

<div id="topbar">
    <h1 style="margin:0;">Movement Log</h1>
    <a href="/">← Назад</a>
</div>

<div id="log"></div>

<script>
    const socket = io();
    const log = document.getElementById("log");

    socket.on("log", (data) => {
        if (!data.MOVEMENT) return;

        const line = document.createElement("div");
        line.innerText = "MOVEMENT: " + data.MOVEMENT;

        log.appendChild(line);

        window.scrollTo(0, document.body.scrollHeight);
    });
</script>

</body>
</html>
