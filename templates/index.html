<!DOCTYPE html>
<html>
<head>
    <title>Reactor</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <style>
        body {
            background: black;
            color: #00FF00;
            font-family: monospace;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        a { color: #00FF00; }

        #data-panel {
            width: 50%;
            padding: 20px;
        }

        #ascii-panel {
            width: 50%;
            padding: 20px;
            white-space: pre;
        }

        /* EMERGENCY картинка */
        #emergency {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 2000;
        }
    </style>
</head>
<body>

<div id="data-panel">
    <h1>Reactor State</h1>
    <a href="/log">Перейти в лог →</a>

    <div>HULL TEMP: <span id="HULL_TEMP">-</span></div>
    <div>CORE TEMP: <span id="CORE_TEMP">-</span></div>
    <div>CONTROL ROD LEVEL: <span id="CONTROL_ROD_LEVEL">-</span></div>
    <div>REACTOR UPTIME: <span id="REACTOR_UPTIME">-</span></div>
    <div>WATER LEVEL: <span id="WATER_LEVEL">-</span></div>
    <div>XENON: <span id="XENON">-</span></div>
</div>

<div id="ascii-panel">
<pre>
   [ REACTOR CORE ]
      |||||||
      |||||||
      |||||||
</pre>
</div>

<!-- аварийная картинка -->
<img id="emergency" src="/static/emergency.png" width="450" height="130">

<script>
    const socket = io();

    let emergencyActive = false;
    let blinkState = false;

    const emergencyImg = document.getElementById("emergency");

    socket.on("update", (data) => {
        if (data["HULL_TEMP"] !== undefined)
            document.getElementById("HULL_TEMP").innerText = data["HULL_TEMP"];

        if (data["CORE_TEMP"] !== undefined)
            document.getElementById("CORE_TEMP").innerText = data["CORE_TEMP"];

        if (data["CONTROL_LEVEL"] !== undefined)
            document.getElementById("CONTROL_LEVEL").innerText = data["CONTROL_LEVEL"];

        if (data["REACTOR_UPTIME"] !== undefined)
            document.getElementById("REACTOR_UPTIME").innerText = data["REACTOR_UPTIME"];

        if (data["WATER_LEVEL"] !== undefined)
            document.getElementById("WATER_LEVEL").innerText = data["WATER_LEVEL"];

        if (data["XENON"] !== undefined)
            document.getElementById("XENON").innerText = data["XENON"];

        if (data["EMERGENCY"] !== undefined) {
            emergencyActive = data["EMERGENCY"];
        }
    });

    // мигание
    setInterval(() => {
        if (emergencyActive) {
            blinkState = !blinkState;

            // фон + текст
            body.classList.add("emergency");
            body.classList.toggle("flash", blinkState);

            // картинка
            emergencyImg.style.display = blinkState ? "block" : "none";

            // ASCII
            ascii.innerText = blinkState ? emergencyArt : normalArt;

        } else {
            body.classList.remove("emergency", "flash");
            emergencyImg.style.display = "none";
            ascii.innerText = normalArt;
        }
    }, 1000);
</script>

</body>
</html>
